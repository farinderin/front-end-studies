# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - front-end-studies

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        working-directory: ./app
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Setup Zero-Dependency Node.js Static Server
        working-directory: ./app/dist
        run: |
          cat > package.json << 'PKGJSON'
          {"name":"static-server","type":"module","scripts":{"start":"node server.js"}}
          PKGJSON
          python3 << 'PYEOF'
          server_code = r"""
          import http from 'node:http';
          import fs from 'node:fs';
          import path from 'node:path';
          import { fileURLToPath } from 'node:url';
          const __dirname = path.dirname(fileURLToPath(import.meta.url));
          const MIME = {'.html':'text/html','.css':'text/css','.js':'text/javascript','.mjs':'text/javascript','.json':'application/json','.svg':'image/svg+xml','.ico':'image/x-icon','.png':'image/png','.jpg':'image/jpeg','.woff':'font/woff','.woff2':'font/woff2'};
          http.createServer((req, res) => {
            try {
              let p = req.url.split('?')[0].replace(/\/+$/, '') || '/index.html';
              let full = path.join(__dirname, p);
              let st = null;
              try { st = fs.statSync(full); } catch(_) {}
              if (st && st.isDirectory()) {
                const idx = path.join(full, 'index.html');
                try { const s2 = fs.statSync(idx); if (s2.isFile()) { full = idx; st = s2; } } catch(_) {}
              }
              if (!st || !st.isFile()) { full = path.join(__dirname, 'index.html'); try { st = fs.statSync(full); } catch(_) { st = null; } }
              if (st && st.isFile()) {
                res.writeHead(200, { 'Content-Type': MIME[path.extname(full)] || 'application/octet-stream' });
                fs.createReadStream(full).pipe(res);
              } else { res.writeHead(404); res.end('Not Found'); }
            } catch(e) { console.error(e); res.writeHead(500); res.end('Error'); }
          }).listen(process.env.PORT || 8080, () => console.log('Listening on', process.env.PORT || 8080));
          """
          with open('server.js', 'w') as f:
              f.write(server_code.strip())
          PYEOF


      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./app/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./app/dist
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D5756D7E6FDF4D95B87520B99B5DCB35 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B6A25E5D05DD492ABB9643907E4D05FF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BA171A21F2364E09AE8A6148449AC8B4 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          slot-name: 'Production'
          package: ./app/dist
          clean: true